# ===========================
# Application Properties
# ===========================
spring.application.name=expense-tracker-backend

# Active Profile (change to 'prod' on Render)
spring.profiles.active=dev

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# ===========================
# JWT Configuration
# ===========================
# IMPORTANT: Override this in environment variables on production
jwt.secret=${JWT_SECRET:mySecretKeyForDevOnlyChangeThisInProduction123456}
jwt.expiration=86400000

# ===========================
# Server
# ===========================
server.port=${PORT:8080}
